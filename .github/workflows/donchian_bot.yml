name: Donchian Breakout Bot

on:
  schedule:
    # 06:00 UTC, Mon-Fri - after daily candle closes, before London fully ramps
    - cron: "0 6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit donchian_state.json back to the repo

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Donchian bot
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python donchian_bot.py

      - name: Commit updated state
        run: |
          git config user.name "donchian-bot"
          git config user.email "donchian-bot@users.noreply.github.com"
          if [ -f donchian_state.json ]; then
            git add donchian_state.json
            git diff --staged --quiet || git commit -m "update donchian state [skip ci]"
            git push
          else
            echo "No donchian_state.json created (no signal found) - nothing to commit."
          fi
